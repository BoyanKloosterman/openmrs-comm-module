spring.application.name=comm-module

# Health en Prometheus (Micrometer)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
# Metrics via Prometheus scrape; geen OTLP-push (voorkomt localhost:4318 WARN)
management.otlp.metrics.export.enabled=false

# Traces naar OTLP-collector (lokaal poort 4318)
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://127.0.0.1:4318/v1/traces

# Proverders-configuratie;
providers.base-url=${PROVIDERS_BASE_URL:http://localhost:1337}
providers.student-group=${PROVIDERS_STUDENT_GROUP:group-c8}

providers.swiftsend.api-key=${SWIFTSEND_API_KEY:your-api-key-here}

providers.securepost.client-id=${SECUREPOST_CLIENT_ID:securepost-client-id}
providers.securepost.client-secret=${SECUREPOST_CLIENT_SECRET:securepost-secret-key}

providers.legacylink.username=${LEGACYLINK_USERNAME:legacylink-user}
providers.legacylink.password=${LEGACYLINK_PASSWORD:legacylink-password}
providers.legacylink.sender=${LEGACYLINK_SENDER:OpenMRS}

providers.asyncflow.api-key=${ASYNCFLOW_API_KEY:asyncflow-api-key}

messaging.queues=queue.swiftsend,queue.securepost,queue.legacylink,queue.asyncflow

# FHIR — in Docker via compose/.env; lokaal: defaults als env vars ontbreken
openmrs.fhir.server-url=${OPENMRS_FHIR_SERVER_URL}
openmrs.fhir.username=${OPENMRS_FHIR_USERNAME}
openmrs.fhir.password=${OPENMRS_FHIR_PASSWORD}

# Tenant-sleutel voor opslag (later meerdere bronnen via US-008)
openmrs.fhir.organisation-id=${OPENMRS_FHIR_ORGANISATION_ID:default}

# Scheduled tasks — fallback-interval; override per org: openmrs.fhir.organisations.<id>.poll-interval-minutes
openmrs.fhir.poll-interval-minutes=${OPENMRS_FHIR_POLL_INTERVAL_MINUTES:1}
# Encounter search: date=ge (UTC) vanaf vandaag minus dit aantal dagen
openmrs.fhir.encounter-poll-since-days=${OPENMRS_FHIR_ENCOUNTER_POLL_SINCE_DAYS:30}

# Retry bij tijdelijke FHIR-fouten (US-003-7)
openmrs.fhir.retry.max-attempts=${OPENMRS_FHIR_RETRY_MAX_ATTEMPTS:3}
openmrs.fhir.retry.initial-backoff-ms=${OPENMRS_FHIR_RETRY_INITIAL_BACKOFF_MS:500}
openmrs.fhir.retry.multiplier=${OPENMRS_FHIR_RETRY_MULTIPLIER:2}

# JPA — Postgres: user/wachtwoord alleen via env (SPRING_DATASOURCE_*), nooit in repo.
# Transport naar DB in prod: zet sslmode=require (of verify-full) op de JDBC-URL, niet in deze app versleuteld.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Encryption Key
app.encryption.key=${APP_ENCRYPTION_KEY:change-me-use-32-byte-key-here!!}

# TLS Configuration
jdk.tls.client.protocols=TLSv1.3
https.protocols=TLSv1.3

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF