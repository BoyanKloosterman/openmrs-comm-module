spring.application.name=comm-module

# Health en Prometheus (Micrometer)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
# Metrics via Prometheus scrape; geen OTLP-push (voorkomt localhost:4318 WARN)
management.otlp.metrics.export.enabled=false

# Traces naar OTLP-collector (lokaal poort 4318)
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://127.0.0.1:4318/v1/traces

# Proverders-configuratie;
providers.base-url=${PROVIDERS_BASE_URL:http://localhost:1337}
providers.student-group=${PROVIDERS_STUDENT_GROUP:group-c8}

providers.swiftsend.api-key=${SWIFTSEND_API_KEY:your-api-key-here}

providers.securepost.client-id=${SECUREPOST_CLIENT_ID:securepost-client-id}
providers.securepost.client-secret=${SECUREPOST_CLIENT_SECRET:securepost-secret-key}

providers.legacylink.username=${LEGACYLINK_USERNAME:legacylink-user}
providers.legacylink.password=${LEGACYLINK_PASSWORD:legacylink-password}
providers.legacylink.sender=${LEGACYLINK_SENDER:OpenMRS}

providers.asyncflow.api-key=${ASYNCFLOW_API_KEY:asyncflow-api-key}

messaging.retry.max-attempts=${MESSAGING_RETRY_MAX_ATTEMPTS:3}
messaging.retry.initial-delay-ms=${MESSAGING_RETRY_INITIAL_DELAY_MS:5000}
messaging.retry.multiplier=${MESSAGING_RETRY_MULTIPLIER:2}
messaging.retry.max-delay-ms=${MESSAGING_RETRY_MAX_DELAY_MS:60000}

messaging.queues=queue.swiftsend,queue.securepost,queue.legacylink,queue.asyncflow

# FHIR R5 (HL7) — elke R5 REST-server; in Docker standaard HAPI-service fhir-r5, niet OpenMRS FHIR2
openmrs.fhir.server-url=${OPENMRS_FHIR_SERVER_URL}
openmrs.fhir.username=${OPENMRS_FHIR_USERNAME:}
openmrs.fhir.password=${OPENMRS_FHIR_PASSWORD:}

# Tenant-sleutel voor opslag (later meerdere bronnen via US-008)
openmrs.fhir.organisation-id=${OPENMRS_FHIR_ORGANISATION_ID:default}

# Scheduled tasks — fallback-interval; override per org: openmrs.fhir.organisations.<id>.poll-interval-minutes
openmrs.fhir.poll-interval-minutes=${OPENMRS_FHIR_POLL_INTERVAL_MINUTES:1}
# Appointment search: date=ge (UTC) vanaf vandaag minus dit aantal dagen
openmrs.fhir.appointment-poll-since-days=${OPENMRS_FHIR_APPOINTMENT_POLL_SINCE_DAYS:30}

# Retry bij tijdelijke FHIR-fouten (US-003-7)
openmrs.fhir.retry.max-attempts=${OPENMRS_FHIR_RETRY_MAX_ATTEMPTS:5}
openmrs.fhir.retry.initial-backoff-ms=${OPENMRS_FHIR_RETRY_INITIAL_BACKOFF_MS:2000}
openmrs.fhir.retry.multiplier=${OPENMRS_FHIR_RETRY_MULTIPLIER:2}

# OpenMRS Legacy UI Appointment Scheduling → FHIR R5 (zelfde Postgres)
openmrs.scheduling.sync.enabled=${OPENMRS_SCHEDULING_FHIR_SYNC_ENABLED:true}
openmrs.scheduling.sync.interval-minutes=${OPENMRS_SCHEDULING_FHIR_SYNC_INTERVAL_MINUTES:1}
openmrs.scheduling.sync.zone-id=${OPENMRS_SCHEDULING_SYNC_ZONE:Europe/Amsterdam}
openmrs.scheduling.sync.lookback-days=${OPENMRS_SCHEDULING_SYNC_LOOKBACK_DAYS:30}
openmrs.scheduling.sync.lookahead-days=${OPENMRS_SCHEDULING_SYNC_LOOKAHEAD_DAYS:365}
openmrs.scheduling.sync.fallback-phone=${OPENMRS_SCHEDULING_SYNC_FALLBACK_PHONE:}

# US-001/002: notificatie-scheduler en herinneringsvensters (24u + 1u)
comm.notification.scheduler.enabled=${COMM_NOTIFICATION_SCHEDULER_ENABLED:true}
comm.notification.scheduler.check-interval-minutes=${COMM_NOTIFICATION_SCHEDULER_CHECK_INTERVAL_MINUTES:1}
comm.notification.scheduler.reminder-lead-hours=${COMM_NOTIFICATION_REMINDER_LEAD_HOURS:24}
comm.notification.scheduler.reminder-1-lead-hours=${COMM_NOTIFICATION_REMINDER_1_LEAD_HOURS:1}
comm.notification.scheduler.reminder-window-minutes=${COMM_NOTIFICATION_REMINDER_WINDOW_MINUTES:60}
comm.notification.scheduler.default-provider=${COMM_NOTIFICATION_DEFAULT_PROVIDER:SWIFTSEND}
comm.notification.scheduler.default-instructions=${COMM_NOTIFICATION_DEFAULT_INSTRUCTIONS:Kom 10 minuten van tevoren. Neem uw legitimatie mee.}
comm.notification.scheduler.reminder-zone=${COMM_NOTIFICATION_REMINDER_ZONE:Europe/Amsterdam}

# US-013: dataretentie (dagelijkse opruimtaak)
comm.data-retention.enabled=${COMM_DATA_RETENTION_ENABLED:true}
comm.data-retention.cleanup-cron=${COMM_DATA_RETENTION_CLEANUP_CRON:0 15 2 * * *}
comm.data-retention.personal-retention-days=${COMM_DATA_RETENTION_PERSONAL_DAYS:14}
comm.data-retention.metadata-retention-days=${COMM_DATA_RETENTION_METADATA_DAYS:365}

# JPA — Postgres: user/wachtwoord alleen via env (SPRING_DATASOURCE_*), nooit in repo.
# Transport naar DB in prod: zet sslmode=require (of verify-full) op de JDBC-URL, niet in deze app versleuteld.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

# Encryption Key
app.encryption.key=${APP_ENCRYPTION_KEY:change-me-use-32-byte-key-here!!}

# TLS Configuration
jdk.tls.client.protocols=TLSv1.3
https.protocols=TLSv1.3

# Test-GUI scheduling/messaging (zet COMM_TEST_GUI_ENABLED=false in productie)
comm.test-gui.enabled=${COMM_TEST_GUI_ENABLED:true}

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF