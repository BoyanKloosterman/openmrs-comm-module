# Zelfde sleutels als productie waar @Value geen default heeft; voorkomt mislukte placeholder-merge in tests
spring.application.name=comm-module-test

spring.datasource.url=jdbc:h2:mem:comm_module_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.tracing.sampling.probability=0.0
management.opentelemetry.tracing.export.otlp.endpoint=http://127.0.0.1:4318/v1/traces

providers.base-url=http://localhost:1337
providers.student-group=group-c8
providers.swiftsend.api-key=test-key

openmrs.fhir.server-url=http://127.0.0.1:9/ws/fhir2/R4
openmrs.fhir.username=test
openmrs.fhir.password=test
openmrs.fhir.poll-interval-minutes=60
openmrs.fhir.encounter-poll-since-days=30

spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.auto-startup=false
