services:
  postgres:
    image: postgres:15-alpine
    container_name: comm-module-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Zie .env.example}
      POSTGRES_USER: ${POSTGRES_USER:?Zie .env.example}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Zie .env.example}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comm-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: comm-module-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?Zie .env.example}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Zie .env.example}
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comm-network
    restart: unless-stopped

  fakecomworld:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    container_name: fakecomworld
    ports:
      - "1337:8080"
    networks:
      - comm-network

  # Standalone FHIR R5 (Appointment + Patient) — US-003; image: hapiproject/hapi op Docker Hub
  hapi-fhir-r5:
    image: hapiproject/hapi:latest
    container_name: comm-module-hapi-fhir-r5
    environment:
      HAPI_FHIR_FHIR_VERSION: R5
      SPRING_DATASOURCE_URL: jdbc:h2:mem:hapi_r5
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
    ports:
      - "8082:8080"
    # hapiproject/hapi is distroless (geen curl/sh) — healthcheck via curl faalt altijd
    healthcheck:
      disable: true
    networks:
      - comm-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: comm-module-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - comm-network
    restart: unless-stopped

  comm-module:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comm-module-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hapi-fhir-r5:
        condition: service_started
      otel-collector:
        condition: service_started
      fakecomworld:
        condition: service_started
    # OpenMRS Reference Application draait apart op de host (poort 80)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?Zie .env.example}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?Zie .env.example}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Zie .env.example}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:?Zie .env.example}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:?Zie .env.example}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:?Zie .env.example}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:?Zie .env.example}
      OPENMRS_DATASOURCE_URL: ${OPENMRS_DATASOURCE_URL:-}
      OPENMRS_DATASOURCE_USERNAME: ${OPENMRS_DATASOURCE_USERNAME:-}
      OPENMRS_DATASOURCE_PASSWORD: ${OPENMRS_DATASOURCE_PASSWORD:-}
      OPENMRS_SCHEDULING_SOURCE: ${OPENMRS_SCHEDULING_SOURCE:-patient-appointment}
      OPENMRS_FHIR_POLL_MODE: ${OPENMRS_FHIR_POLL_MODE:-fhir}
      OPENMRS_FHIR_JDBC_FALLBACK_ENABLED: ${OPENMRS_FHIR_JDBC_FALLBACK_ENABLED:-true}
      OPENMRS_FHIR_SERVER_URL: ${OPENMRS_FHIR_SERVER_URL:-}
      OPENMRS_FHIR_USERNAME: ${OPENMRS_FHIR_USERNAME:-}
      OPENMRS_FHIR_PASSWORD: ${OPENMRS_FHIR_PASSWORD:-}
      OPENMRS_FHIR_ORGANISATION_ID: ${OPENMRS_FHIR_ORGANISATION_ID:-default}
      OPENMRS_FHIR_POLL_INTERVAL_MINUTES: ${OPENMRS_FHIR_POLL_INTERVAL_MINUTES:-1}
      OPENMRS_FHIR_APPOINTMENT_POLL_SINCE_DAYS: ${OPENMRS_FHIR_APPOINTMENT_POLL_SINCE_DAYS:-30}
      OPENMRS_SCHEDULING_FHIR_SYNC_ENABLED: ${OPENMRS_SCHEDULING_FHIR_SYNC_ENABLED:-false}
      OPENMRS_SCHEDULING_FHIR_SYNC_APPOINTMENT: ${OPENMRS_SCHEDULING_FHIR_SYNC_APPOINTMENT:-false}
      OPENMRS_SCHEDULING_FHIR_SYNC_INTERVAL_MINUTES: ${OPENMRS_SCHEDULING_FHIR_SYNC_INTERVAL_MINUTES:-1}
      OPENMRS_SCHEDULING_SYNC_ZONE: ${OPENMRS_SCHEDULING_SYNC_ZONE:-Europe/Amsterdam}
      OPENMRS_SCHEDULING_SYNC_DB_ZONE: ${OPENMRS_SCHEDULING_SYNC_DB_ZONE:-UTC}
      OPENMRS_SCHEDULING_SYNC_FALLBACK_PHONE: ${OPENMRS_SCHEDULING_SYNC_FALLBACK_PHONE:-+31612345678}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Zie .env.example}
      COMM_NOTIFICATION_SCHEDULER_ENABLED: ${COMM_NOTIFICATION_SCHEDULER_ENABLED:-true}
      COMM_NOTIFICATION_SCHEDULER_CHECK_INTERVAL_MINUTES: ${COMM_NOTIFICATION_SCHEDULER_CHECK_INTERVAL_MINUTES:-1}
      COMM_NOTIFICATION_REMINDER_LEAD_HOURS: ${COMM_NOTIFICATION_REMINDER_LEAD_HOURS:-24}
      COMM_NOTIFICATION_REMINDER_1_LEAD_HOURS: ${COMM_NOTIFICATION_REMINDER_1_LEAD_HOURS:-1}
      COMM_NOTIFICATION_REMINDER_WINDOW_MINUTES: ${COMM_NOTIFICATION_REMINDER_WINDOW_MINUTES:-60}
      COMM_NOTIFICATION_REMINDER_ZONE: ${COMM_NOTIFICATION_REMINDER_ZONE:-Europe/Amsterdam}
      PROVIDERS_BASE_URL: ${PROVIDERS_BASE_URL:-http://fakecomworld:8080}
      PROVIDERS_STUDENT_GROUP: ${PROVIDERS_STUDENT_GROUP:-group-c8}
      SWIFTSEND_API_KEY: ${SWIFTSEND_API_KEY:-your-api-key-here}
      SECUREPOST_CLIENT_ID: ${SECUREPOST_CLIENT_ID:-securepost-client-id}
      SECUREPOST_CLIENT_SECRET: ${SECUREPOST_CLIENT_SECRET:-securepost-secret-key}
      LEGACYLINK_USERNAME: ${LEGACYLINK_USERNAME:-legacylink-user}
      LEGACYLINK_PASSWORD: ${LEGACYLINK_PASSWORD:-legacylink-password}
      LEGACYLINK_SENDER: ${LEGACYLINK_SENDER:-OpenMRS}
      ASYNCFLOW_API_KEY: ${ASYNCFLOW_API_KEY:-asyncflow-api-key}
      MESSAGING_RETRY_MAX_ATTEMPTS: ${MESSAGING_RETRY_MAX_ATTEMPTS:-3}
      MESSAGING_RETRY_INITIAL_DELAY_MS: ${MESSAGING_RETRY_INITIAL_DELAY_MS:-5000}
      MESSAGING_RETRY_MULTIPLIER: ${MESSAGING_RETRY_MULTIPLIER:-2}
      MESSAGING_RETRY_MAX_DELAY_MS: ${MESSAGING_RETRY_MAX_DELAY_MS:-60000}
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: ${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - comm-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: comm-module-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      comm-module:
        condition: service_started
    networks:
      - comm-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: comm-module-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Zie .env.example}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Zie .env.example}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - comm-network
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  grafana_data:

networks:
  comm-network:
    driver: bridge
