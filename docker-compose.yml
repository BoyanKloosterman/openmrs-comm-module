services:
  postgres:
    image: postgres:15-alpine
    container_name: comm-module-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Zie .env.example}
      POSTGRES_USER: ${POSTGRES_USER:?Zie .env.example}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Zie .env.example}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comm-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: comm-module-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?Zie .env.example}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Zie .env.example}
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comm-network
    restart: unless-stopped

  # Standalone FHIR R5 (HL7 Appointment) — niet OpenMRS FHIR2
  fhir-r5:
    # Gebruik latest (Spring Boot), niet latest-tomcat: die kan ROOT.war niet uitpakken (rechten)
    image: hapiproject/hapi:latest
    container_name: comm-module-fhir-r5
    volumes:
      - ./docker/fhir-r5/application.yaml:/data/hapi/application.yaml:ro
    environment:
      SPRING_CONFIG_LOCATION: file:///data/hapi/application.yaml
    ports:
      - "8082:8080"
    # Geen healthcheck: image heeft geen curl; seed/comm-module wachten zelf op metadata
    networks:
      - comm-network
    restart: unless-stopped

  fhir-r5-seed:
    image: curlimages/curl:8.5.0
    container_name: comm-module-fhir-r5-seed
    depends_on:
      fhir-r5:
        condition: service_started
    volumes:
      - ./docker/fhir-r5:/seed:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        BASE=http://fhir-r5:8080/fhir
        echo "Wachten op FHIR R5 metadata..."
        until curl -sf "$$BASE/metadata" >/dev/null; do sleep 10; done
        curl -sf -X PUT "$$BASE/Patient/patient-docker-1" -H "Content-Type: application/fhir+json" --data-binary @/seed/seed-patient.json
        curl -sf -X PUT "$$BASE/Appointment/apt-docker-1" -H "Content-Type: application/fhir+json" --data-binary @/seed/seed-appointment.json
        echo "FHIR R5 seed klaar"
    networks:
      - comm-network
    restart: "no"

  openmrs:
    build:
      context: ./docker/openmrs
      dockerfile: Dockerfile
    # Lokale tag; niet op Docker Hub — bij module-wijziging: docker compose build openmrs
    image: openmrs-comm-fhir:2.5.14-appointments
    pull_policy: build
    container_name: openmrs-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OMRS_DB: postgresql
      OMRS_DB_HOSTNAME: postgres
      OMRS_DB_PORT: 5432
      OMRS_DB_NAME: ${POSTGRES_DB:?Zie .env.example}
      OMRS_DB_USERNAME: ${POSTGRES_USER:?Zie .env.example}
      OMRS_DB_PASSWORD: ${POSTGRES_PASSWORD:?Zie .env.example}
      OMRS_CREATE_TABLES: "true"
      OMRS_AUTO_UPDATE_DATABASE: "true"
      OMRS_ADMIN_USER_PASSWORD: ${OMRS_ADMIN_USER_PASSWORD:?Zie .env.example}
    ports:
      - "8080:8080"
    volumes:
      - openmrs_data:/openmrs/data
    # Static asset voorkomt login/alert-tag errors in de OpenMRS logs.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs/scripts/jquery/jquery.min.js"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    networks:
      - comm-network
    restart: unless-stopped

  fakecomworld:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    container_name: fakecomworld
    ports:
      - "1337:8080"
    networks:
      - comm-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: comm-module-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - comm-network
    restart: unless-stopped

  comm-module:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comm-module-app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # OpenMRS wordt pas minuten later "healthy"; comm-module mag al starten.
      # FHIR: wacht op seed (die pollt tot /metadata bereikbaar is) — HAPI heeft 1–3 min nodig.
      fhir-r5-seed:
        condition: service_completed_successfully
      openmrs:
        condition: service_started
      otel-collector:
        condition: service_started
      fakecomworld:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?Zie .env.example}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?Zie .env.example}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Zie .env.example}
      SPRING_RABBITMQ_HOST: ${SPRING_RABBITMQ_HOST:?Zie .env.example}
      SPRING_RABBITMQ_PORT: ${SPRING_RABBITMQ_PORT:?Zie .env.example}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:?Zie .env.example}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:?Zie .env.example}
      # FHIR R5 REST-base (HAPI in compose); geen OpenMRS FHIR2-module nodig
      OPENMRS_URL: ${OPENMRS_URL:?Zie .env.example}
      OPENMRS_FHIR_SERVER_URL: ${OPENMRS_FHIR_SERVER_URL:?Zie .env.example}
      OPENMRS_FHIR_USERNAME: ${OPENMRS_FHIR_USERNAME:-}
      OPENMRS_FHIR_PASSWORD: ${OPENMRS_FHIR_PASSWORD:-}
      OPENMRS_FHIR_ORGANISATION_ID: ${OPENMRS_FHIR_ORGANISATION_ID:-default}
      OPENMRS_FHIR_POLL_INTERVAL_MINUTES: ${OPENMRS_FHIR_POLL_INTERVAL_MINUTES:-1}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Zie .env.example}
      COMM_NOTIFICATION_SCHEDULER_ENABLED: ${COMM_NOTIFICATION_SCHEDULER_ENABLED:-true}
      COMM_NOTIFICATION_SCHEDULER_CHECK_INTERVAL_MINUTES: ${COMM_NOTIFICATION_SCHEDULER_CHECK_INTERVAL_MINUTES:-1}
      COMM_NOTIFICATION_REMINDER_LEAD_HOURS: ${COMM_NOTIFICATION_REMINDER_LEAD_HOURS:-24}
      COMM_NOTIFICATION_REMINDER_WINDOW_MINUTES: ${COMM_NOTIFICATION_REMINDER_WINDOW_MINUTES:-60}
      COMM_NOTIFICATION_REMINDER_ZONE: ${COMM_NOTIFICATION_REMINDER_ZONE:-Europe/Amsterdam}
      PROVIDERS_BASE_URL: ${PROVIDERS_BASE_URL:-http://fakecomworld:8080}
      PROVIDERS_STUDENT_GROUP: ${PROVIDERS_STUDENT_GROUP:-group-c8}
      SWIFTSEND_API_KEY: ${SWIFTSEND_API_KEY:-your-api-key-here}
      SECUREPOST_CLIENT_ID: ${SECUREPOST_CLIENT_ID:-securepost-client-id}
      SECUREPOST_CLIENT_SECRET: ${SECUREPOST_CLIENT_SECRET:-securepost-secret-key}
      LEGACYLINK_USERNAME: ${LEGACYLINK_USERNAME:-legacylink-user}
      LEGACYLINK_PASSWORD: ${LEGACYLINK_PASSWORD:-legacylink-password}
      LEGACYLINK_SENDER: ${LEGACYLINK_SENDER:-OpenMRS}
      ASYNCFLOW_API_KEY: ${ASYNCFLOW_API_KEY:-asyncflow-api-key}
      MESSAGING_RETRY_MAX_ATTEMPTS: ${MESSAGING_RETRY_MAX_ATTEMPTS:-3}
      MESSAGING_RETRY_DELAY_MS: ${MESSAGING_RETRY_DELAY_MS:-5000}
      # Default: service otel-collector (oude .env zonder deze key blijft werken)
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: ${MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - comm-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: comm-module-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      comm-module:
        condition: service_started
    networks:
      - comm-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: comm-module-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?Zie .env.example}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Zie .env.example}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - comm-network
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  openmrs_data:
  grafana_data:

networks:
  comm-network:
    driver: bridge
